<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Manga — Gibibi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --surface2: #141414;
      --border: #1c1c1c;
      --neon: #00f5d4;
      --neon-dim: rgba(0,245,212,0.1);
      --neon-glow: 0 0 20px rgba(0,245,212,0.4);
      --red: #ff3b5c;
      --red-dim: rgba(255,59,92,0.1);
      --green-dim: rgba(0,245,212,0.12);
      --text: #e0e0e0;
      --muted: #444;
      --font: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,212,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,212,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* halftone top-right decoration */
    body::after {
      content: '';
      position: fixed;
      top: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(0,245,212,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      width: 100%;
      max-width: 540px;
      position: relative;
      z-index: 1;
    }

    /* ── NAV ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
    }

    .back {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    .back:hover { color: var(--neon); }

    .nav-tag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 3px;
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeUp 0.5s ease both;
    }

    h1 {
      font-size: clamp(36px, 10vw, 54px);
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }

    h1 .accent { color: var(--neon); }

    .subtitle {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 3px;
      margin-top: 8px;
      text-transform: uppercase;
    }

    /* ── SCORE BAR ── */
    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 18px;
      margin-bottom: 20px;
      font-family: var(--mono);
      font-size: 12px;
      animation: fadeUp 0.5s 0.1s ease both;
      opacity: 0;
    }

    .score-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .score-val { font-size: 20px; font-weight: 400; color: var(--neon); }
    .score-lbl { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

    .progress-wrap {
      flex: 1;
      margin: 0 20px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--neon);
      border-radius: 2px;
      transition: width 0.4s ease;
      box-shadow: 0 0 8px rgba(0,245,212,0.5);
    }

    /* ── QUESTION CARD ── */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.4s 0.15s ease both;
      opacity: 0;
    }

    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
      opacity: 0.4;
    }

    .q-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .q-num {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .q-category {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--neon);
      border: 1px solid rgba(0,245,212,0.25);
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 1px;
    }

    .q-emoji {
      font-size: 40px;
      display: block;
      text-align: center;
      margin-bottom: 16px;
      filter: drop-shadow(0 0 12px rgba(0,245,212,0.2));
    }

    .q-text {
      font-size: clamp(16px, 4vw, 20px);
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
      color: #fff;
    }

    /* ── ANSWERS ── */
    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
      animation: fadeUp 0.4s 0.2s ease both;
      opacity: 0;
    }

    .ans-btn {
      padding: 14px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      line-height: 1.3;
    }

    .ans-btn:hover:not(:disabled) {
      border-color: rgba(0,245,212,0.3);
      background: rgba(0,245,212,0.05);
    }

    .ans-btn:active:not(:disabled) { transform: scale(0.97); }

    .ans-btn.correct {
      border-color: var(--neon);
      background: var(--green-dim);
      color: var(--neon);
    }

    .ans-btn.wrong {
      border-color: var(--red);
      background: var(--red-dim);
      color: var(--red);
    }

    .ans-btn:disabled { cursor: default; }

    /* ── FEEDBACK ── */
    .feedback {
      text-align: center;
      padding: 14px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      animation: pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .feedback.show { display: block; }
    .feedback.good { background: var(--green-dim); border: 1px solid rgba(0,245,212,0.3); color: var(--neon); }
    .feedback.bad  { background: var(--red-dim); border: 1px solid rgba(255,59,92,0.3); color: var(--red); }

    @keyframes pop {
      from { transform: scale(0.9); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    /* ── NEXT BTN ── */
    .btn-next {
      width: 100%;
      padding: 14px;
      background: var(--neon-dim);
      border: 1px solid rgba(0,245,212,0.3);
      border-radius: 8px;
      color: var(--neon);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.15s;
      display: none;
    }

    .btn-next.show { display: block; animation: fadeUp 0.3s ease both; }
    .btn-next:hover { background: rgba(0,245,212,0.18); box-shadow: var(--neon-glow); }

    /* ── RESULTS ── */
    .results {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 24px;
      animation: fadeUp 0.5s ease both;
    }

    .results.show { display: flex; }

    .result-emoji { font-size: 64px; }

    .result-score {
      font-family: var(--mono);
      font-size: 64px;
      color: var(--neon);
      text-shadow: var(--neon-glow);
      line-height: 1;
    }

    .result-label {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
    }

    .result-sub {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .result-breakdown {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .result-breakdown h3 {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .breakdown-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      text-align: left;
    }

    .breakdown-item:last-child { border-bottom: none; }
    .breakdown-q { flex: 1; color: #888; font-size: 12px; font-family: var(--mono); }
    .breakdown-icon { font-size: 14px; margin-left: 8px; }

    .btn-restart {
      padding: 14px 32px;
      background: var(--neon-dim);
      border: 1px solid rgba(0,245,212,0.3);
      border-radius: 8px;
      color: var(--neon);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
    }

    .btn-restart:hover { background: rgba(0,245,212,0.18); box-shadow: var(--neon-glow); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 52px;
      font-family: var(--mono);
      font-size: 11px;
      color: #2a2a2a;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="page">

  <nav>
    <a class="back" href="../index.html">← Retour</a>
    <span class="nav-tag">Projet JS</span>
  </nav>

  <header>
    <h1>QUIZ <span class="accent">MANGA</span></h1>
    <p class="subtitle">Connais-tu vraiment ton animé ?</p>
  </header>

  <!-- QUIZ SECTION -->
  <div id="quiz-section">
    <div class="score-bar">
      <div class="score-item">
        <span class="score-val" id="score-val">0</span>
        <span class="score-lbl">Score</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
      <div class="score-item">
        <span class="score-val" id="q-counter">1/10</span>
        <span class="score-lbl">Question</span>
      </div>
    </div>

    <div class="question-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Question 01</span>
        <span class="q-category" id="q-cat">Shonen</span>
      </div>
      <span class="q-emoji" id="q-emoji">⚔️</span>
      <p class="q-text" id="q-text">Chargement...</p>
    </div>

    <div class="answers" id="answers"></div>

    <div class="feedback" id="feedback"></div>

    <button class="btn-next" id="btn-next" onclick="nextQuestion()">
      Question suivante →
    </button>
  </div>

  <!-- RESULTS SECTION -->
  <div class="results" id="results">
    <div class="result-emoji" id="result-emoji">🎌</div>
    <div class="result-score" id="result-score">0/10</div>
    <div class="result-label" id="result-label">Résultat</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-breakdown" id="result-breakdown">
      <h3>— Détail des réponses</h3>
      <div id="breakdown-list"></div>
    </div>
    <button class="btn-restart" onclick="restartQuiz()">↺ Recommencer</button>
  </div>

  <footer>fait avec 💻 et beaucoup de café ( de Colombia 🇨🇴 Pues Claro!) </footer>
</div>

<script>
  const QUESTIONS = [
    {
      cat: "Naruto",
      emoji: "🍥",
      q: "Quel est le nom du démon renard scellé dans Naruto ?",
      answers: ["Kurama", "Shukaku", "Gyūki", "Matatabi"],
      correct: 0
    },
    {
      cat: "Dragon Ball",
      emoji: "🐉",
      q: "Combien y a-t-il de boules de cristal ?",
      answers: ["7", "5", "12", "9"],
      correct: 0
    },
    {
      cat: "One Piece",
      emoji: "🏴‍☠️",
      q: "Quel est le rêve de Monkey D. Luffy ?",
      answers: ["Devenir Roi des Pirates", "Trouver le One Piece", "Battre Shanks", "Libérer ses amis"],
      correct: 0
    },
    {
      cat: "Attack on Titan",
      emoji: "⚡",
      q: "Comment s'appelle la ville fortifiée où vit Eren au début ?",
      answers: ["Shiganshina", "Trost", "Paradis", "Utgard"],
      correct: 0
    },
    {
      cat: "Demon Slayer",
      emoji: "🗡️",
      q: "Quelle est la couleur de la lame de Tanjiro ?",
      answers: ["Noir", "Rouge", "Bleu", "Vert"],
      correct: 0
    },
    {
      cat: "Death Note",
      emoji: "📓",
      q: "Quel est le vrai nom de Kira ?",
      answers: ["Light Yagami", "L Lawliet", "Near", "Mello"],
      correct: 0
    },
    {
      cat: "Jujutsu Kaisen",
      emoji: "👁️",
      q: "Quel est le fléau scellé dans le corps de Yuji Itadori ?",
      answers: ["Ryomen Sukuna", "Mahito", "Jogo", "Dagon"],
      correct: 0
    },
    {
      cat: "My Hero Academia",
      emoji: "💥",
      q: "Quel est le vrai prénom de Deku ?",
      answers: ["Izuku", "Katsuki", "Shoto", "Tenya"],
      correct: 0
    },
    {
      cat: "Hunter x Hunter",
      emoji: "🎯",
      q: "Quel type de Nen Gon utilise principalement ?",
      answers: ["Émission", "Renforcement", "Transformation", "Manipulation"],
      correct: 1
    },
    {
      cat: "One Piece",
      emoji: "⚔️",
      q: "Combien de sabres Zoro utilise-t-il en combat (style Santoryu) ?",
      answers: ["3", "2", "1", "4"],
      correct: 0
    }
  ];

  // Shuffle answers for each question
  function prepareQuestions(qs) {
    return qs.map(q => {
      const correctAnswer = q.answers[q.correct];
      const shuffled = [...q.answers].sort(() => Math.random() - 0.5);
      return {
        ...q,
        shuffledAnswers: shuffled,
        correctIdx: shuffled.indexOf(correctAnswer)
      };
    });
  }

  let questions = [];
  let current = 0;
  let score = 0;
  let answered = false;
  let history = []; // { correct: bool, q: string }

  function startQuiz() {
    questions = prepareQuestions([...QUESTIONS].sort(() => Math.random() - 0.5));
    current = 0;
    score = 0;
    answered = false;
    history = [];
    renderQuestion();
  }

  function renderQuestion() {
    const q = questions[current];
    answered = false;

    // Meta
    document.getElementById('q-num').textContent = `Question ${String(current + 1).padStart(2, '0')}`;
    document.getElementById('q-cat').textContent = q.cat;
    document.getElementById('q-emoji').textContent = q.emoji;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-counter').textContent = `${current + 1}/${questions.length}`;
    document.getElementById('score-val').textContent = score;
    document.getElementById('progress-bar').style.width = `${(current / questions.length) * 100}%`;

    // Answers
    const container = document.getElementById('answers');
    container.innerHTML = '';
    q.shuffledAnswers.forEach((ans, i) => {
      const btn = document.createElement('button');
      btn.className = 'ans-btn';
      btn.textContent = ans;
      btn.onclick = () => selectAnswer(i);
      container.appendChild(btn);
    });

    // Reset feedback
    const fb = document.getElementById('feedback');
    fb.className = 'feedback';
    fb.textContent = '';

    const btnNext = document.getElementById('btn-next');
    btnNext.className = 'btn-next';
  }

  function selectAnswer(idx) {
    if (answered) return;
    answered = true;

    const q = questions[current];
    const btns = document.querySelectorAll('.ans-btn');
    const isCorrect = (idx === q.correctIdx);

    btns.forEach(b => b.disabled = true);
    btns[idx].classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) btns[q.correctIdx].classList.add('correct');

    const fb = document.getElementById('feedback');
    if (isCorrect) {
      score++;
      fb.textContent = '✓ Bonne réponse !';
      fb.className = 'feedback good show';
    } else {
      fb.textContent = `✗ Raté — c'était : ${q.shuffledAnswers[q.correctIdx]}`;
      fb.className = 'feedback bad show';
    }

    history.push({ correct: isCorrect, q: q.q });
    document.getElementById('score-val').textContent = score;

    const btnNext = document.getElementById('btn-next');
    btnNext.textContent = current < questions.length - 1 ? 'Question suivante →' : 'Voir les résultats →';
    btnNext.className = 'btn-next show';
  }

  function nextQuestion() {
    current++;
    if (current >= questions.length) {
      showResults();
    } else {
      renderQuestion();
    }
  }

  function showResults() {
    document.getElementById('quiz-section').style.display = 'none';
    const results = document.getElementById('results');
    results.className = 'results show';

    const pct = score / questions.length;
    let emoji, label, sub;

    if (pct === 1)      { emoji = '🏆'; label = 'Parfait, senpai !';      sub = 'T\'as tout bon. Respect.'; }
    else if (pct >= 0.8) { emoji = '🔥'; label = 'Presque parfait !';     sub = 'Tu maîtrises le game.'; }
    else if (pct >= 0.6) { emoji = '⚡'; label = 'Pas mal du tout !';      sub = 'Encore quelques épisodes à regarder.'; }
    else if (pct >= 0.4) { emoji = '📚'; label = 'Il faut réviser...';     sub = 'Relance la série ce soir.'; }
    else                 { emoji = '😅'; label = 'Tu regardes du manga ?'; sub = 'On va dire que t\'as débuté.'; }

    document.getElementById('result-emoji').textContent = emoji;
    document.getElementById('result-score').textContent = `${score}/${questions.length}`;
    document.getElementById('result-label').textContent = label;
    document.getElementById('result-sub').textContent = sub;

    // Breakdown
    const list = document.getElementById('breakdown-list');
    list.innerHTML = '';
    history.forEach(h => {
      const item = document.createElement('div');
      item.className = 'breakdown-item';
      item.innerHTML = `
        <span class="breakdown-q">${h.q}</span>
        <span class="breakdown-icon">${h.correct ? '✓' : '✗'}</span>
      `;
      item.querySelector('.breakdown-icon').style.color = h.correct ? 'var(--neon)' : 'var(--red)';
      list.appendChild(item);
    });
  }

  function restartQuiz() {
    document.getElementById('results').className = 'results';
    document.getElementById('quiz-section').style.display = 'block';
    startQuiz();
  }

  // Start
  startQuiz();
</script>
</body>
</html>
